<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="about.css">
    <link rel="stylesheet" href="../nav.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Everything Burger</title>
</head>
<body>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu" aria-label="Open menu">
        <img src="../assets/images/BurgerIcon.png" alt="">
    </button>

    <main class="about-page">
        <div class="about-canvas">
            <h1 class="about-title">About me</h1>
            <img
                class="about-info about-info--desktop"
                src="../assets/images/About Me Info.png"
                alt=""
            >
            <img
                class="about-info about-info--mobile"
                src="../assets/images/InfoMobileAlt.png"
                alt=""
            >
            <img
                class="about-info2"
                src="../assets/images/Info2.png"
                alt="Extracurriculars"
            >
            <div class="about-ellipse" aria-hidden="true">
                <svg viewBox="0 0 2351 1861" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="1175.5" cy="930.5" rx="1175.5" ry="930.5"/>
                </svg>
            </div>
            <img
                class="about-music-list"
                src="../assets/images/MusicList.png"
                alt="Music list"
            >
            <div class="about-shadow-star">
                <img
                    class="about-shadow-star__img"
                    src="../assets/images/ShadowStar.png"
                    alt=""
                >
            </div>
            <img
                class="about-graphic"
                src="../assets/images/AboutMeGraphic.png"
                alt="About me"
            >
        </div>
    </main>

    <script src="../nav.js"></script>
    <script src="../stars.js"></script>
</body>
</html>
