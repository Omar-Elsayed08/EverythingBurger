<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="nav.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Everything Burger</title>
</head>
<body>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu" aria-label="Open menu">
        <img src="assets/images/BurgerIcon.png" alt="">
    </button>

    <div class="hero">
        <img class="burger-text hero-layer" src="assets/images/EverythingBurgerText.svg" alt="Everything Burger">
        <img class="lazer-baby hero-layer" src="assets/images/LazerBaby.png" alt="">
        <img class="paper-star hero-layer" src="assets/images/PaperStar.png" alt="">
        <img class="white-star hero-layer" src="assets/images/WhiteStar.png" alt="">
        <img class="circle-hashes hero-layer" src="assets/images/CircleHashes.png" alt="">
        <img class="circle-hashes-2 hero-layer" src="assets/images/CircleHashes.png" alt="">
        <p class="experience-text hero-layer">
            <span class="experience-text__top">3D</span>
            <span class="experience-text__bottom">Experience</span>
        </p>
        <a class="shop-sign hero-layer hero-btn" href="shop/shop.html" aria-label="Shop">
            <img src="assets/images/ShopSIgn.png" alt="">
        </a>
        <div class="shop-shirt-1 shop-shirt hero-layer">
            <img class="shop-shirt__img" src="assets/images/Shirt.png" alt="">
        </div>
        <div class="shop-shirt-2 shop-shirt hero-layer">
            <img class="shop-shirt__img" src="assets/images/Shirt.png" alt="">
        </div>
        <div class="shop-shirt-3 shop-shirt hero-layer">
            <img class="shop-shirt__img" src="assets/images/Shirt.png" alt="">
        </div>
        <img class="small-paper-star hero-layer" src="assets/images/SmallerPaperStar.png" alt="">
        <img class="shadow-star hero-layer" src="assets/images/ShadowStar.png" alt="">
        <img class="tree-creature hero-layer" src="assets/images/TreeCreature.png" alt="">
        <div class="sharp-explosion hero-layer">
            <img class="sharp-explosion__img" src="assets/images/SharpExplosion.png" alt="">
        </div>
        <img class="cube hero-layer" src="assets/images/Cube.png" alt="">
        <img class="column-arm hero-layer" src="assets/images/ColumnAndArm.png" alt="">
        <img class="foot hero-layer" src="assets/images/Foot.png" alt="">
        <img class="checker-board hero-layer" src="assets/images/CheckerBoard.png" alt="">
        <img class="headphone-blob hero-layer" src="assets/images/HeadphoneBlob.png" alt="">
        <img class="drawing-hand hero-layer" src="assets/images/DrawingHand.png" alt="">
        <div class="circle-hand hero-layer">
            <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="150" cy="150" rx="150" ry="150" fill="#FF6031"/>
            </svg>
        </div>
        <div class="rect-block hero-layer">
            <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <rect width="400" height="120" fill="#FFE5A0"/>
            </svg>
        </div>
        <div class="rect-white hero-layer">
            <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <rect width="400" height="120" fill="#FFFFFF"/>
            </svg>
        </div>
        <div class="burger-wrap hero-layer">
            <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="150" cy="150" rx="150" ry="150" fill="#FF6031"/>
            </svg>
        </div>
        <div class="circle-blue hero-layer">
            <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="150" cy="150" rx="150" ry="150" fill="#95D4F0"/>
            </svg>
        </div>
        <a class="about-portrait-btn hero-layer hero-btn" href="about/about.html" aria-label="About me">
            <img src="assets/images/AboutMePortraitButton.png" alt="">
        </a>
        <a class="about-text-btn hero-layer hero-btn" href="about/about.html">About me</a>
        <a class="gallery-btn hero-layer hero-btn" href="gallery/gallery.html" aria-label="Gallery">
            <img src="assets/images/GalleryButton.png" alt="">
        </a>
        <footer class="site-footer">
            <h2 class="site-footer__title">Contact</h2>
            <div class="site-footer__info-row">
                <div class="site-footer__details">
                    <p>petercsnowden@gmail.com</p>
                    <p>@peter.c.snowden</p>
                    <p>(731) 803-8263</p>
                </div>
                <div class="site-footer__circles" aria-hidden="true">
                    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="88"  cy="30" r="26" fill="#FF6031"/>
                        <circle cx="58" cy="40" r="24" fill="#95D4F0"/>
                        <circle cx="32" cy="50" r="22" fill="#000000"/>
                    </svg>
                </div>
            </div>
            <a class="site-footer__guestbook" href="#">Guest Book</a>
            <div class="site-footer__socials">
                <a class="social-btn" href="https://instagram.com/peter.c.snowden" target="_blank" rel="noopener">
                    <img src="assets/images/InstagramIcon.png" alt="Instagram">
                </a>
                <a class="social-btn" href="https://www.youtube.com/@UnstableSmiles" target="_blank" rel="noopener">
                    <img src="assets/images/YoutubeIcon.png" alt="YouTube">
                </a>
                <a class="social-btn" href="https://letterboxd.com/smilie/" target="_blank" rel="noopener">
                    <img src="assets/images/LetterBoxdIcon.png" alt="Letterboxd">
                </a>
            </div>
        </footer>
    </div>
    <script src="nav.js"></script>
    <script src="shirts.js"></script>
    <script src="stars.js"></script>
</body>
</html>
