<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everything Burger</title>
</head>
<body>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu" aria-label="Open menu">
        <img src="BurgerIcon.png" alt="">
    </button>

    <nav class="nav-menu" id="nav-menu" aria-hidden="true">
        <div class="nav-menu__panel">
            <div class="nav-menu__content">
                <img class="nav-menu__logo" src="EverythingBurgerText.svg" alt="Everything Burger">
                <div class="nav-stack">
                    <div class="nav-stack__reveal">
                        <img class="nav-stack__image" src="BurgerStack.png" alt="">
                    </div>
                    <div class="nav-stack__layers">
                        <a class="nav-stack__btn" href="#">Menu</a>
                        <a class="nav-stack__btn" href="#">About</a>
                        <a class="nav-stack__btn" href="#">Locations</a>
                        <a class="nav-stack__btn" href="#">Gallery</a>
                        <a class="nav-stack__btn" href="#">Contact</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="hero">
        <img class="burger-text hero-layer" src="EverythingBurgerText.svg" alt="Everything Burger">
        <img class="lazer-baby hero-layer" src="LazerBaby.png" alt="">
        <img class="paper-star hero-layer" src="PaperStar.png" alt="">
        <img class="white-star hero-layer" src="WhiteStar.png" alt="">
        <img class="circle-hashes hero-layer" src="CircleHashes.png" alt="">
        <img class="small-paper-star hero-layer" src="SmallerPaperStar.png" alt="">
        <img class="shadow-star hero-layer" src="ShadowStar.png" alt="">
        <img class="tree-creature hero-layer" src="TreeCreature.png" alt="">
        <img class="sharp-explosion hero-layer" src="SharpExplosion.png" alt="">
        <img class="cube hero-layer" src="Cube.png" alt="">
        <img class="column-arm hero-layer" src="ColumnAndArm.png" alt="">
        <img class="foot hero-layer" src="Foot.png" alt="">
        <img class="checker-board hero-layer" src="CheckerBoard.png" alt="">
        <img class="headphone-blob hero-layer" src="HeadphoneBlob.png" alt="">
        <img class="drawing-hand hero-layer" src="DrawingHand.png" alt="">
        <div class="circle-hand hero-layer">
            <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="150" cy="150" rx="150" ry="150" fill="#FF6031"/>
            </svg>
        </div>
        <div class="rect-block hero-layer">
            <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <rect width="400" height="120" fill="#FFE5A0"/>
            </svg>
        </div>
        <div class="rect-white hero-layer">
            <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <rect width="400" height="120" fill="#FFFFFF"/>
            </svg>
        </div>
        <div class="burger-wrap hero-layer">
            <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="150" cy="150" rx="150" ry="150" fill="#FF6031"/>
            </svg>
        </div>
        <div class="circle-blue hero-layer">
            <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="150" cy="150" rx="150" ry="150" fill="#95D4F0"/>
            </svg>
        </div>
    </div>
    <script src="nav.js"></script>
</body>
</html>
