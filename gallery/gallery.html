<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="gallery.css">
    <link rel="stylesheet" href="../nav.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Everything Burger</title>
</head>
<body>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-menu" aria-label="Open menu">
        <img src="../assets/images/BurgerIcon.png" alt="">
    </button>

    <main class="gallery-page">
        <div class="gallery-canvas">
            <div class="gallery-circle" aria-hidden="true">
                <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="150" cy="150" r="150"/>
                </svg>
            </div>
            <div class="gallery-rect" aria-hidden="true">
                <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                    <rect width="400" height="120"/>
                </svg>
            </div>
            <div class="gallery-rect-2" aria-hidden="true">
                <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                    <rect width="400" height="120"/>
                </svg>
            </div>
            <h1 class="gallery-title">gallery</h1>
            <div class="gallery-buttons">
                <a class="gallery-btn" href="film/film.html">
                    <img src="../assets/GalleryAssets/film/FilmButton.png" alt="">
                    <span class="gallery-btn__label">Film</span>
                </a>
                <a class="gallery-btn" href="art/art.html">
                    <img src="../assets/GalleryAssets/visual-art/VisualArtButton.png" alt="">
                    <span class="gallery-btn__label">Visual Art</span>
                </a>
                <a class="gallery-btn" href="more/more.html">
                    <img src="../assets/GalleryAssets/more/MoreButton.png" alt="">
                    <span class="gallery-btn__label">More</span>
                </a>
            </div>
            <img
                class="gallery-doodle"
                src="../assets/images/DoodleSwirl.png"
                alt=""
            >
            <footer class="site-footer">
                <h2 class="site-footer__title">Contact</h2>
                <div class="site-footer__info-row">
                    <div class="site-footer__details">
                        <p>petercsnowden@gmail.com</p>
                        <p>@peter.c.snowden</p>
                        <p>(731) 803-8263</p>
                    </div>
                    <div class="site-footer__circles" aria-hidden="true">
                        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="88"  cy="30" r="26" fill="#FF6031"/>
                            <circle cx="58" cy="40" r="24" fill="#95D4F0"/>
                            <circle cx="32" cy="50" r="22" fill="#000000"/>
                        </svg>
                    </div>
                </div>
                <a class="site-footer__guestbook" href="#">Guest Book</a>
                <div class="site-footer__socials">
                    <a class="social-btn" href="https://instagram.com/peter.c.snowden" target="_blank" rel="noopener">
                        <img src="../assets/images/InstagramIcon.png" alt="Instagram">
                    </a>
                    <a class="social-btn" href="https://www.youtube.com/@UnstableSmiles" target="_blank" rel="noopener">
                        <img src="../assets/images/YoutubeIcon.png" alt="YouTube">
                    </a>
                    <a class="social-btn" href="https://letterboxd.com/smilie/" target="_blank" rel="noopener">
                        <img src="../assets/images/LetterBoxdIcon.png" alt="Letterboxd">
                    </a>
                </div>
            </footer>
        </div>
    </main>

    <script src="../nav.js"></script>
</body>
</html>
